name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Deno version
      placeholder: Windows 11, Node 20, Deno 2.x

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error output or screenshots
